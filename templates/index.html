<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام الدبلجة التلقائية الذكي</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f7f6; margin: 40px auto; max-width: 700px; text-align: center; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        input[type="file"] { margin: 20px 0; padding: 10px; }
        button { background: #2ecc71; color: white; border: none; padding: 12px 24px; font-size: 16px; border-radius: 6px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #27ae60; }
        #status { margin: 20px 0; font-weight: bold; color: #34495e; }
        video { margin-top: 25px; width: 100%; border-radius: 8px; border: 2px solid #bdc3c7; background: #000; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🎙️ نظام دبلجة الفيديو إلى العربية (بدون Redis)</h2>
        <p>اختر فيديو إنجليزي لترجمته ودبلجته بالكامل</p>
        <input type="file" id="videoInput" accept="video/*"><br>
        <button id="uploadBtn">رفع وبدء المعالجة تلقائياً</button>
        <div id="status">الحالة: في انتظار رفع فيديو...</div>
        <video id="videoPlayer" controls style="display:none;"></video>
    </div>
    <script>
        const uploadBtn = document.getElementById('uploadBtn');
        const videoInput = document.getElementById('videoInput');
        const statusDiv = document.getElementById('status');
        const videoPlayer = document.getElementById('videoPlayer');

        uploadBtn.addEventListener('click', async () => {
            if (!videoInput.files[0]) { alert('الرجاء اختيار ملف فيديو أولاً!'); return; }
            const formData = new FormData();
            formData.append('video', videoInput.files[0]);
            statusDiv.innerHTML = "⏳ جاري رفع ملف الفيديو إلى السيرفر...";
            videoPlayer.style.display = "none";
            try {
                const response = await fetch('/api/upload-video', { method: 'POST', body: formData });
                const data = await response.json();
                if (data.job_id) { trackJobStatus(data.job_id); } 
                else { statusDiv.innerHTML = "❌ حدث خطأ أثناء الرفع."; }
            } catch (err) { statusDiv.innerHTML = "❌ فشل الاتصال بالسيرفر."; }
        });

        function trackJobStatus(jobId) {
            statusDiv.innerHTML = "⚙️ جاري معالجة الفيديو في الخلفية...";
            const interval = setInterval(async () => {
                try {
                    const response = await fetch(`/api/status/${jobId}`);
                    const data = await response.json();
                    if (data.status === 'PROCESSING') {
                        statusDiv.innerHTML = "⚙️ جاري معالجة الـ Pipeline (تفريغ وترجمة ودبلجة)...";
                    } else if (data.status === 'SUCCESS') {
                        clearInterval(interval);
                        statusDiv.innerHTML = "✅ اكتملت الدبلجة بنجاح!";
                        videoPlayer.src = `/api/download/${jobId}`;
                        videoPlayer.style.display = "block";
                        videoPlayer.play();
                    } else if (data.status === 'FAILED') {
                        clearInterval(interval);
                        statusDiv.innerHTML = "❌ فشلت المعالجة. السبب: " + data.error_message;
                    }
                } catch (err) { console.error(err); }
            }, 3000);
        }
    </script>
</body>
</html>
